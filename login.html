<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐝 TGR Assistant - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #FF6B00;
      --primary-light: #FF8A3D;
      --primary-dark: #CC5500;
      --accent: #00D9FF;
      --success: #10B981;
      --danger: #EF4444;
      --bg-dark: #0a0a0f;
      --bg-card: #12121a;
      --bg-card-hover: #1a1a25;
      --border: #2a2a3a;
      --text: #ffffff;
      --text-muted: #9CA3AF;
      --text-dim: #6B7280;
      --gradient-primary: linear-gradient(135deg, #FF6B00 0%, #FF8A3D 100%);
      --gradient-glow: radial-gradient(ellipse at top, rgba(255,107,0,0.2) 0%, transparent 60%);
      --shadow-glow: 0 0 40px rgba(255,107,0,0.25);
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-xl: 28px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--gradient-glow);
      pointer-events: none;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 50px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      position: relative;
      animation: slideUp 0.5s ease-out;
      box-shadow: var(--shadow-glow);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      background: var(--gradient-primary);
      border-radius: var(--radius-xl);
      font-size: 32px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-glow);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: var(--shadow-glow); }
      50% { box-shadow: 0 0 60px rgba(255,107,0,0.4); }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    h1 span {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 36px;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 24px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 10px;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .form-control {
      width: 100%;
      padding: 16px 18px;
      background: var(--bg-dark);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(255,107,0,0.15);
    }

    .form-control::placeholder {
      color: var(--text-dim);
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 600;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--gradient-primary);
      color: white;
      box-shadow: var(--shadow-glow);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 50px rgba(255,107,0,0.35);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: var(--danger);
      padding: 14px 18px;
      border-radius: var(--radius-md);
      margin-bottom: 24px;
      display: none;
      font-size: 0.9rem;
      align-items: center;
      gap: 10px;
    }

    .error i {
      font-size: 1.1rem;
    }

    .footer-link {
      margin-top: 24px;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    .footer-link a {
      color: var(--primary);
      text-decoration: none;
    }

    .footer-link a:hover {
      text-decoration: underline;
    }

    /* Loading state */
    .btn.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .btn .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 40px 24px;
      }
      .logo {
        width: 60px;
        height: 60px;
        font-size: 26px;
      }
      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">🐝</div>
    <h1>TGR <span>Assistant</span></h1>
    <p class="subtitle">Enter your password to access the dashboard</p>

    <div id="error" class="error">
      <i class="fas fa-exclamation-circle"></i>
      <span></span>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="password">
          <i class="fas fa-lock"></i> Password
        </label>
        <input type="password" id="password" class="form-control" placeholder="Enter your dashboard password" required>
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i>
        Login
      </button>
    </form>

    <p class="footer-link">
      Contact admin if you forgot your password
    </p>
  </div>

  <script>
    const API_BASE = '';
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      const btn = document.getElementById('loginBtn');
      
      btn.innerHTML = '<span class="spinner"></span> Verifying...';
      btn.classList.add('loading');
      errorEl.style.display = 'none';
      
      try {
        const res = await fetch(API_BASE + '/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('dashboardToken', data.token);
          window.location.href = 'index.html';
        } else {
          errorEl.querySelector('span').textContent = data.error || 'Invalid password';
          errorEl.style.display = 'flex';
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
          btn.classList.remove('loading');
        }
      } catch (e) {
        errorEl.querySelector('span').textContent = 'Connection error. Is the bot running?';
        errorEl.style.display = 'flex';
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
        btn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
